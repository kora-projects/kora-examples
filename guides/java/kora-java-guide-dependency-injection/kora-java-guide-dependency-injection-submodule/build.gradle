plugins {
    id "java-library"
}

dependencies {
    annotationProcessor "io.koraframework:annotation-processors"

    api project(":guides:java:kora-java-guide-dependency-injection:kora-java-guide-dependency-injection-common")

    implementation "io.koraframework:common"

    testAnnotationProcessor "io.koraframework:annotation-processors"

    testImplementation platform("org.junit:junit-bom:$junitVersion")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testImplementation "io.koraframework:test-junit5"
}
