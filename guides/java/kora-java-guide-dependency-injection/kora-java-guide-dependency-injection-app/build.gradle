plugins {
    id "application"
}

dependencies {
    annotationProcessor "io.koraframework:annotation-processors"

    implementation project(":guides:java:kora-java-guide-dependency-injection:kora-java-guide-dependency-injection-common")
    implementation project(":guides:java:kora-java-guide-dependency-injection:kora-java-guide-dependency-injection-lib")
    implementation project(":guides:java:kora-java-guide-dependency-injection:kora-java-guide-dependency-injection-submodule")
    implementation "io.koraframework:config-hocon"
    implementation "io.koraframework:logging-logback"

    testAnnotationProcessor "io.koraframework:annotation-processors"

    testImplementation platform("org.junit:junit-bom:$junitVersion")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testImplementation "io.koraframework:test-junit5"
}

application {
    applicationName = "application"
    mainClass = "ru.tinkoff.kora.guide.dependencyinjection.Application"
    applicationDefaultJvmArgs = ["-Dfile.encoding=UTF-8"]
}

distTar {
    archiveFileName = "application.tar"
}
