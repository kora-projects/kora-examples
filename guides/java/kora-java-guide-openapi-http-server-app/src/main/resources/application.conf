httpServer {
  publicApiHttpPort = 8080
  privateApiHttpPort = 8085
  telemetry.logging.enabled = true
}

openapi {
  management {
    file = [ "openapi/user-http-server.yaml" ]
    enabled = true
    endpoint = "/openapi"
    swaggerui {
      enabled = true
      endpoint = "/swagger-ui"
    }
  }
}

logging.level {
  "root" = "WARN"
  "ru.tinkoff.kora" = "INFO"
  "ru.tinkoff.kora.guide.openapi.httpserver" = "INFO"
}

