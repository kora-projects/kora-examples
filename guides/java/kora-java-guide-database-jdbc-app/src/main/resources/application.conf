httpServer {
  publicApiHttpPort = 8080
  privateApiHttpPort = 8085
  telemetry.logging.enabled = true
}

db {
  jdbcUrl = ${?POSTGRES_JDBC_URL}
  username = ${?POSTGRES_USER}
  password = ${?POSTGRES_PASS}
  maxPoolSize = 10
  poolName = "guide-jdbc"
}

flyway {
  locations = "db/migration"
}

logging {
  levels {
    "ROOT": "WARN"
    "ru.tinkoff.kora": "INFO"
  }
}
