httpServer {
  publicApiHttpPort = 8081
  privateApiHttpPort = 8086
  telemetry.logging.enabled = true
}

httpClient {
  UsersApi {
    url = "http://localhost:8080"
    url = ${?PUBLIC_API_URL}
    requestTimeout = 10s
  }
  telemetry.logging.enabled = true
}

logging {
  levels {
    "ROOT": "INFO"
    "ru.tinkoff.kora": "INFO"
    "ru.tinkoff.kora.guide.openapi.httpclient": "INFO"
  }
}


