kafka:
  publisher:
    task:
      topic: "tasks"
      driverProperties:
        bootstrap:
          servers: ${KAFKA_BOOTSTRAP}
      telemetry.logging.enabled: true
  listener:
    user:
      pollTimeout: 250ms
      topics: "users"
      driverProperties:
        bootstrap.servers: ${KAFKA_BOOTSTRAP}
        group.id: "users-gi"
        auto.offset.reset: "earliest"
        enable.auto.commit: true
      telemetry.logging.enabled: true


logging:
  level:
    root: ${?LOGGING_LEVEL_ROOT:WARN}
    ru.tinkoff.kora: ${?LOGGING_LEVEL_KORA:INFO}
    ru.tinkoff.kora.kafka: ${?LOGGING_LEVEL_KORA_KAFKA:INFO}
    ru.tinkoff.kora.example: ${?LOGGING_LEVEL_APP:INFO}
    ru.tinkoff.kora.application.graph.internal.loom.VirtualThreadExecutorHolder: ${?LOGGING_LEVEL_VIRTUAL_THREAD_EXECUTOR:DEBUG}
